[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/_sources-a-analyser/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/docs/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.codex-backups/*"
  to = "/404.html"
  status = 404
  force = true
